name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Detect base path for project pages
        id: base
        run: |
          # If the repo isn't named "<owner>.github.io", we're on a project page
          # served at /<repo>/, so we need basePath/assetPrefix.
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER_NAME="${GITHUB_REPOSITORY%/*}"
          if [ "${REPO_NAME,,}" = "${OWNER_NAME,,}.github.io" ]; then
            echo "base=" >> "$GITHUB_OUTPUT"
          else
            echo "base=/${REPO_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build static site
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.base.outputs.base }}
        run: npm run build

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
